[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/"
  status = 301

[[redirects]]
  from = "/news"
  to = "/news.html"
  status = 301

[[redirects]]
  from = "/news/*"
  to = "/news.html?id=:splat"
  status = 301

[[redirects]]
  from = "/column"
  to = "/news.html"
  status = 301

[[redirects]]
  from = "/column/*"
  to = "/news.html"
  status = 301

[[redirects]]
  from = "/about"
  to = "/company.html"
  status = 301

[[redirects]]
  from = "/company"
  to = "/company.html"
  status = 301

[[redirects]]
  from = "/service"
  to = "/services.html"
  status = 301

[[redirects]]
  from = "/services"
  to = "/services.html"
  status = 301

[[redirects]]
  from = "/recruit"
  to = "/recruit.html"
  status = 301

[[redirects]]
  from = "/fee"
  to = "/recruit.html"
  status = 301
