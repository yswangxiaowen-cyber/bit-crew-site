<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>管理画面 | 株式会社ビット・クルー</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f7f6;
      }

      .admin-fallback {
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: #17232b;
        text-align: center;
      }

      .admin-fallback-card {
        width: min(480px, 100%);
        border: 1px solid #dce6e3;
        border-radius: 8px;
        background: #fff;
        padding: 36px 28px;
        box-shadow: 0 20px 50px rgba(10, 39, 49, 0.08);
      }

      .admin-fallback h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      .admin-fallback p {
        margin: 0 0 24px;
        color: #5d6972;
        line-height: 1.7;
      }

      .admin-fallback button {
        border: 0;
        border-radius: 6px;
        background: #08798b;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 14px 24px;
      }
    </style>
  </head>
  <body>
    <div class="admin-fallback" id="admin-fallback">
      <div class="admin-fallback-card">
        <h1>管理画面</h1>
        <p>ログイン画面を読み込んでいます。表示されない場合は、下のボタンからログインしてください。</p>
        <button type="button" id="identity-open">Login</button>
      </div>
    </div>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", function (user) {
          var hasInvite = window.location.hash.indexOf("invite_token=") !== -1;
          var hasRecovery = window.location.hash.indexOf("recovery_token=") !== -1;

          if (hasInvite) {
            window.netlifyIdentity.open("signup");
          } else if (hasRecovery) {
            window.netlifyIdentity.open("recovery");
          } else if (!user) {
            window.netlifyIdentity.open("login");
          }
        });

        window.netlifyIdentity.on("login", function () {
          document.location.href = "/admin/";
        });

        window.netlifyIdentity.on("signup", function () {
          document.location.href = "/admin/";
        });

        var openButton = document.getElementById("identity-open");
        if (openButton) {
          openButton.addEventListener("click", function () {
            window.netlifyIdentity.open();
          });
        }
      }
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
